<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Animado</title>
    <style>
        /* Configurações básicas para ocupar a tela toda */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Impede barras de rolagem */
            background-color: #000; /* Fundo preto */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container do Texto */
        .content {
            position: relative;
            z-index: 10; /* Garante que o texto fique acima dos quadrados */
            text-align: center;
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            padding: 20px 0;
            /* As linhas brancas em cima e embaixo */
            border-top: 3px solid #fff;
            border-bottom: 3px solid #fff;
        }

        /* Estilização dos Quadrados Animados */
        .square {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.3); /* Branco com transparência */
            border: 1px solid rgba(255, 255, 255, 0.5);
            pointer-events: none; /* Não interfere no mouse */
            bottom: -150px; /* Começa abaixo da tela */
            animation: animate linear infinite;
        }

        /* Animação de subida e rotação */
        @keyframes animate {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Background Animado</h1>
    </div>

    <script>
        function createSquares() {
            const body = document.querySelector('body');
            const count = 40; // Quantidade de quadrados simultâneos

            for (let i = 0; i < count; i++) {
                let square = document.createElement('div');
                square.classList.add('square');

                // Tamanhos aleatórios
                let size = Math.random() * 50 + 10; // Entre 10px e 60px
                
                // Posições horizontais aleatórias
                let posX = Math.random() * window.innerWidth;
                
                // Delays e durações aleatórias para não subirem todos juntos
                let delay = Math.random() * 10;
                let duration = Math.random() * 15 + 5; // Entre 5s e 20s

                square.style.width = size + 'px';
                square.style.height = size + 'px';
                square.style.left = posX + 'px';
                square.style.animationDelay = delay + 's';
                square.style.animationDuration = duration + 's';

                body.appendChild(square);
            }
        }

        // Inicia a geração dos quadrados
        createSquares();
    </script>
</body>
</html>
