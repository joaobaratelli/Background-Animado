<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Background</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        overflow: hidden;
        height: 100vh;
        font-family: Arial, sans-serif;
    }

    .content {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2;
    }

    h1 {
        color: white;
        font-size: 40px;
        letter-spacing: 2px;
    }

    .square {
        position: absolute;
        bottom: -50px;
        background: rgba(220, 240, 255, 0.12);
        border: 1px solid rgba(220, 240, 255, 0.25);
        animation: subir linear infinite;
    }

    @keyframes subir {
        from {
            transform: translateY(0) rotate(0deg);
            opacity: 0.5;
        }
        to {
            transform: translateY(-110vh) rotate(360deg);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div class="content">
    <h1>Animated Background</h1>
</div>

<script>
    const quantidade = 12; // pouca quantidade

    for (let i = 0; i < quantidade; i++) {
        const square = document.createElement("div");
        square.classList.add("square");

        let size = Math.random() * 40 + 10;
        square.style.width = size + "px";
        square.style.height = size + "px";

        square.style.left = Math.random() * 100 + "vw";

        square.style.animationDuration = (Math.random() * 10 + 12) + "s";
        square.style.animationDelay = Math.random() * 5 + "s";

        document.body.appendChild(square);
    }
</script>

</body>
</html>
